<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>가상 사무실 — 나만의 에이전트 팀</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <button class="status-tile small" id="teamTile">
    <div class="tile-icon">🏢</div>
    <div>
      <div class="tile-title">나만의<br>에이전트<br>팀</div>
    </div>
  </button>
  <button class="status-tile" id="dayTile">
    <div class="tile-row">
      <span class="tile-pill green">DAY <b id="dayValue">1</b></span>
    </div>
  </button>
  <button class="status-tile" id="timeTile">
    <div class="tile-row">
      <span class="tile-pill red">⏰ TIME <b id="timeValue">09:00</b></span>
    </div>
  </button>
  <button class="status-tile big" id="autoTile">
    <div class="tile-row">
      <span class="tile-pill bigpill green-on">●<br>24시간 자동 운영<br><b id="autoLabel">ON</b></span>
    </div>
  </button>
  <a class="status-tile big" id="matrixTile" href="../agent_matrix/index.html">
    <div class="tile-row">
      <span class="tile-pill bigpill green-light">👥<br>직원 에이전트 보기</span>
    </div>
  </a>
  <button class="status-tile small icon-only" id="settingsTile">⚙</button>
  <button class="status-tile small icon-only" id="logsTile">📒</button>
  <button class="status-tile small icon-only" id="filesTile">📁</button>
</header>

<section class="status-strip" id="statusStrip">
  <span class="strip-dot"></span>
  <span>사무실 가동 중</span>
  <span class="strip-sep">·</span>
  <span id="currentPair">사장님 명령 대기</span>
  <span class="strip-sep">·</span>
  <span id="realDataBadge" class="real-badge" hidden>🌊 실데이터 대기</span>
  <span id="hermesBadge" class="real-badge">⚪ Hermes 미연결</span>
</section>

<main class="office-grid">
  <div class="office-map-card">
    <svg id="officeMap" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" aria-label="가상 사무실 맵"></svg>
  </div>

  <aside class="side-panel">
    <div class="tab-row">
      <button class="tab active" data-tab="activity">🪄 활동</button>
      <button class="tab" data-tab="artifacts">📦 산출물</button>
      <button class="tab" data-tab="dialog">📜 대화록</button>
    </div>

    <div class="tab-body" data-tab-body="activity">
      <ul class="activity-list" id="activityList"></ul>
    </div>
    <div class="tab-body" data-tab-body="artifacts" hidden>
      <div class="artifacts-empty" id="artifactsEmpty">
        <div class="empty-icon">📦</div>
        <div class="empty-title">아직 산출물이 없어요</div>
        <div class="empty-sub">사이드바 채팅이나 텔레그램으로 일을 던져주세요.</div>
      </div>
      <ul class="artifact-list" id="artifactList" hidden></ul>
    </div>
    <div class="tab-body" data-tab-body="dialog" hidden>
      <div class="dialog-box" id="dialogBox"></div>
      <button class="refresh-btn" id="dialogRefresh">↻ 새로고침</button>
    </div>
  </aside>
</main>

<footer class="footnote">
  모든 활동은 dry-run 시뮬레이션입니다. 외부 채널 반영은 09_approval 승인 후 사장님이 직접 실행하셔야 합니다.
</footer>

<script src="../agent_matrix/agents_data.js"></script>
<script src="app.js"></script>
</body>
</html>
